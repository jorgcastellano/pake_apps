name: Build Gather Desktop Linux

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build AppImage and DEB
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Linux packages
        run: |
          pake https://app.v2.gather.town/app \
            --name "GatherDesktop" \
            --width 1280 \
            --height 800 \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --inject inject.js \
            --targets deb,appimage

      - name: Organize artifacts
        shell: bash
        run: |
          mkdir -p dist
          find . -type f \( -name "*.deb" -o -name "*.AppImage" \) ! -path "*/node_modules/*" ! -path "*/target/*" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gather-desktop-linux
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
