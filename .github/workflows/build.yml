name: Build Web App Desktop Linux

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL web a empaquetar"
        required: true
        default: "https://web.whatsapp.com/"
      package_name:
        description: "Nombre tecnico sin espacios"
        required: true
        default: "WhatsAppDesktop"
      width:
        description: "Ancho inicial de ventana"
        required: true
        default: "1280"
      height:
        description: "Alto inicial de ventana"
        required: true
        default: "800"
      targets:
        description: "Targets Pake"
        required: true
        default: "deb,appimage"
      user_agent:
        description: "User-Agent opcional"
        required: false
        default: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build AppImage and DEB
    runs-on: ubuntu-22.04
    env:
      APP_URL: ${{ github.event.inputs.app_url || 'https://web.whatsapp.com/' }}
      PACKAGE_NAME: ${{ github.event.inputs.package_name || 'WhatsAppDesktop' }}
      WINDOW_WIDTH: ${{ github.event.inputs.width || '1280' }}
      WINDOW_HEIGHT: ${{ github.event.inputs.height || '800' }}
      TARGETS: ${{ github.event.inputs.targets || 'deb,appimage' }}
      USER_AGENT: ${{ github.event.inputs.user_agent || 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Linux packages
        run: |
          pake "$APP_URL" \
            --name "$PACKAGE_NAME" \
            --width "$WINDOW_WIDTH" \
            --height "$WINDOW_HEIGHT" \
            --user-agent "$USER_AGENT" \
            --inject inject.js \
            --targets "$TARGETS"

      - name: Organize artifacts
        shell: bash
        run: |
          mkdir -p dist
          find . -type f \( -name "*.deb" -o -name "*.AppImage" \) ! -path "*/node_modules/*" ! -path "*/target/*" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-linux
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
